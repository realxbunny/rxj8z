<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — rxj8z</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#05050e;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.17);--text:#eeeeff;--muted:rgba(238,238,255,.44);--blue:#5B73FF;--indigo:#8B5CF6;--green:#22D65F;--red:#FF4F64;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 20% 10%,rgba(91,115,255,.13) 0%,transparent 55%),radial-gradient(ellipse 55% 50% at 85% 85%,rgba(139,92,246,.1) 0%,transparent 55%);pointer-events:none;}
body::after{content:'';position:fixed;inset:0;opacity:.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

.box{background:rgba(255,255,255,.04);backdrop-filter:blur(32px);border:1px solid var(--border);border-top-color:var(--border2);border-radius:28px;padding:42px 40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 40px 100px rgba(0,0,0,.6);}
.box::before{content:'';position:absolute;inset:0;background:linear-gradient(148deg,rgba(255,255,255,.06) 0%,transparent 40%);border-radius:inherit;pointer-events:none;}

.back{position:absolute;top:24px;left:28px;z-index:2;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;}
.back:hover{color:var(--text);}

.logo{font-family:'Syne',sans-serif;font-weight:900;font-size:26px;letter-spacing:-.05em;background:linear-gradient(120deg,#fff 20%,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px;}
.sub{font-size:13px;color:var(--muted);margin-bottom:28px;}

/* TABS */
.tabs{display:flex;gap:0;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:50px;padding:3px;margin-bottom:26px;}
.tab{flex:1;padding:8px;border-radius:50px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;}
.tab.active{background:var(--blue);color:#fff;box-shadow:0 0 18px rgba(91,115,255,.3);}

/* GOOGLE BTN */
.g-btn{width:100%;padding:13px;border-radius:14px;border:1px solid var(--border2);background:rgba(255,255,255,.06);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s;font-family:'DM Sans',sans-serif;margin-bottom:20px;}
.g-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);transform:translateY(-1px);}
.g-btn:active{transform:scale(.97);}
.g-btn svg{flex-shrink:0;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;font-size:12px;color:var(--muted);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* FORM */
.field{margin-bottom:14px;}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.03em;}
input{width:100%;padding:13px 16px;border-radius:13px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-top-color:var(--border2);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:all .25s;}
input::placeholder{color:rgba(238,238,255,.25);}
input:focus{border-color:rgba(91,115,255,.5);background:rgba(91,115,255,.06);box-shadow:0 0 0 3px rgba(91,115,255,.12);}
input:-webkit-autofill{-webkit-box-shadow:0 0 0 30px #0e0e1e inset!important;-webkit-text-fill-color:var(--text)!important;}
.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;transition:color .2s;}
.pw-toggle:hover{color:var(--text);}

.submit-btn{width:100%;padding:14px;border-radius:14px;background:var(--blue);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .3s;box-shadow:0 0 24px rgba(91,115,255,.3);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(91,115,255,.45);}
.submit-btn:active{transform:scale(.97);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.err{background:rgba(255,79,100,.1);border:1px solid rgba(255,79,100,.25);border-radius:12px;padding:11px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none;}
.err.show{display:block;}
.ok{background:rgba(34,214,95,.1);border:1px solid rgba(34,214,95,.25);border-radius:12px;padding:11px 14px;font-size:13px;color:var(--green);margin-bottom:14px;display:none;}
.ok.show{display:block;}

.terms{font-size:11px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.5;}
.terms a{color:var(--blue);text-decoration:none;}

/* SPINNER */
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<a class="back" href="index.html">← Back to rxj8z</a>

<div class="box">
  <div class="logo">rxj8z</div>
  <div class="title" id="form-title">Welcome back</div>
  <p class="sub" id="form-sub">Sign in to access exclusive resources</p>

  <div class="tabs">
    <button class="tab active" id="tab-in" onclick="switchTab('in')">Sign In</button>
    <button class="tab" id="tab-up" onclick="switchTab('up')">Sign Up</button>
  </div>

  <!-- GOOGLE -->
  <button class="g-btn" onclick="googleSignIn()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Continue with Google
  </button>

  <div class="divider">or continue with email</div>

  <div class="err" id="err-msg"></div>
  <div class="ok" id="ok-msg"></div>

  <!-- SIGN UP ONLY FIELD -->
  <div class="field" id="name-field" style="display:none;">
    <label>Display Name</label>
    <input type="text" id="inp-name" placeholder="Your name">
  </div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="inp-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')document.getElementById('inp-pass').focus()">
  </div>

  <div class="field">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitForm()">
      <button class="pw-toggle" onclick="togglePw()" id="pw-eye">👁</button>
    </div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitForm()">
    <span id="btn-text">Sign In</span>
  </button>

  <p class="terms">By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
</div>

<script>
// ── FIREBASE CONFIG — same as index.html ──
const firebaseConfig = {
  apiKey: "AIzaSyBENiFatE6ZAd86GfmC2JECwjYedMKdSbA",
  authDomain: "rxj8z-backend.firebaseapp.com",
  projectId: "rxj8z-backend",
  storageBucket: "rxj8z-backend.firebasestorage.app",
  messagingSenderId: "170293636064",
  appId: "1:170293636064:web:bd9893cc73f12f6d229985"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Check URL for mode
const mode = new URLSearchParams(window.location.search).get('mode');
if(mode === 'signup') switchTab('up');

// Redirect if already signed in
auth.onAuthStateChanged(user=>{
  if(user) window.location.href = 'index.html#resources';
});

let currentTab = 'in';
function switchTab(tab){
  currentTab = tab;
  const isUp = tab === 'up';
  document.getElementById('tab-in').classList.toggle('active', !isUp);
  document.getElementById('tab-up').classList.toggle('active', isUp);
  document.getElementById('name-field').style.display = isUp ? 'block' : 'none';
  document.getElementById('form-title').textContent = isUp ? 'Create account' : 'Welcome back';
  document.getElementById('form-sub').textContent = isUp ? 'Get free access to exclusive resources' : 'Sign in to access exclusive resources';
  document.getElementById('btn-text').textContent = isUp ? 'Create Account' : 'Sign In';
  clearMsgs();
}

function clearMsgs(){
  document.getElementById('err-msg').classList.remove('show');
  document.getElementById('ok-msg').classList.remove('show');
}
function showErr(msg){const e=document.getElementById('err-msg');e.textContent=msg;e.classList.add('show');}
function showOk(msg){const e=document.getElementById('ok-msg');e.textContent=msg;e.classList.add('show');}

function setLoading(v){
  const btn=document.getElementById('submit-btn');
  btn.disabled=v;
  btn.innerHTML=v?'<div class="spin"></div>':'<span id="btn-text">'+(currentTab==='up'?'Create Account':'Sign In')+'</span>';
}

async function submitForm(){
  clearMsgs();
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const name=document.getElementById('inp-name').value.trim();
  if(!email){showErr('Please enter your email.');return;}
  if(!pass||pass.length<6){showErr('Password must be at least 6 characters.');return;}
  setLoading(true);
  try{
    if(currentTab==='up'){
      if(!name){showErr('Please enter your display name.');setLoading(false);return;}
      const cred=await auth.createUserWithEmailAndPassword(email,pass);
      await cred.user.updateProfile({displayName:name});
      showOk('Account created! Redirecting…');
      setTimeout(()=>window.location.href='index.html#resources',1200);
    }else{
      await auth.signInWithEmailAndPassword(email,pass);
      showOk('Signed in! Redirecting…');
      setTimeout(()=>window.location.href='index.html#resources',800);
    }
  }catch(e){
    const msgs={
      'auth/user-not-found':'No account found with that email.',
      'auth/wrong-password':'Incorrect password. Try again.',
      'auth/email-already-in-use':'An account with this email already exists.',
      'auth/invalid-email':'Please enter a valid email address.',
      'auth/weak-password':'Password should be at least 6 characters.',
      'auth/too-many-requests':'Too many attempts. Please try again later.',
      'auth/network-request-failed':'Network error. Check your connection.'
    };
    showErr(msgs[e.code]||e.message);
    setLoading(false);
  }
}

async function googleSignIn(){
  clearMsgs();
  const provider=new firebase.auth.GoogleAuthProvider();
  try{
    await auth.signInWithPopup(provider);
    showOk('Signed in with Google! Redirecting…');
    setTimeout(()=>window.location.href='index.html#resources',800);
  }catch(e){
    if(e.code!=='auth/popup-closed-by-user')showErr(e.message);
  }
}

function togglePw(){
  const inp=document.getElementById('inp-pass');
  inp.type=inp.type==='password'?'text':'password';
  document.getElementById('pw-eye').textContent=inp.type==='password'?'👁':'🙈';
}
</script>
</body>
</html>
